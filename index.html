<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>כזה, אבל באייהרב</title>
<style>
:root{--ig:#458500;--igl:#edf4e1;--tx:#2b2b2b;--tx2:#8c8c8c;--bd:#e6e6e6;--bl:#126cc5;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#f2f3f2;font-family:-apple-system,'Segoe UI',Arial,sans-serif;color:var(--tx);}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;}
.wrap{padding:16px 16px 40px;}
.top{display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:#fff;z-index:5;}
.top .mk{color:var(--ig);font-size:20px;}
.top b{font-weight:800;font-size:15px;}
.top b span{color:var(--ig);}
.hero{padding:34px 4px 8px;}
.hero .mk{color:var(--ig);font-size:30px;display:block;margin-bottom:10px;}
.hero h1{margin:0;font-size:34px;line-height:1.2;font-weight:800;}
.hero h1 span{color:var(--ig);}
.searchbar{display:flex;gap:8px;align-items:center;margin:22px 0 12px;}
.searchbar input{flex:1;border:1px solid var(--bd);border-radius:24px;padding:13px 16px;font-size:15px;outline:none;font-family:inherit;}
.searchbar input:focus{border-color:var(--ig);}
.go{width:44px;height:44px;flex:0 0 44px;border:none;border-radius:50%;background:var(--ig);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.poplabel{font-size:12px;color:var(--tx2);margin:0 2px 9px;display:flex;align-items:center;gap:5px;}
#pop{margin-bottom:26px;}
.ex{display:flex;flex-wrap:wrap;gap:7px;}
.ex button{font-size:13px;padding:7px 13px;border:1px solid var(--bd);border-radius:20px;background:#fff;color:var(--tx);cursor:pointer;font-family:inherit;}
.trust{display:flex;gap:16px;border-top:1px solid var(--bd);padding-top:14px;color:var(--tx2);font-size:12px;}
.trust span{display:flex;align-items:center;gap:5px;}.trust i{color:var(--ig);}
.q{display:flex;justify-content:flex-start;margin:6px 0 10px;}
.q div{background:var(--igl);color:var(--ig);padding:8px 13px;border-radius:14px 14px 4px 14px;font-size:14px;}
.echo{background:var(--igl);border-radius:9px;padding:10px 12px;margin-bottom:10px;display:flex;gap:8px;align-items:flex-start;font-size:14px;}
.echo i{color:var(--ig);font-size:18px;}
.brandnote{font-size:12.5px;color:var(--tx2);margin:0 2px 12px;}
.brandnote b{color:var(--tx);}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.chips button{font-size:12px;padding:6px 12px;border:1px solid var(--bd);border-radius:18px;background:#fff;color:var(--tx);cursor:pointer;font-family:inherit;}
.chips button.on{background:var(--ig);color:#fff;border-color:var(--ig);}
.note{background:#fff8e6;border:1px solid #f0e0b0;color:#8a6d1a;font-size:12.5px;padding:9px 12px;border-radius:8px;margin-bottom:12px;display:flex;gap:7px;}
.card{border:1px solid var(--bd);border-radius:14px;padding:12px;margin-bottom:11px;}
.card.best{border:2px solid var(--ig);}
.crow{display:flex;gap:12px;}
.thumb{flex:0 0 78px;height:78px;border-radius:9px;background:#f2f2f2;object-fit:contain;}
.badge{display:inline-block;background:var(--ig);color:#fff;font-size:11px;padding:2px 9px;border-radius:6px;margin-bottom:5px;margin-left:4px;}
.badge.val{background:var(--igl);color:var(--ig);}
.cname{margin:0 0 6px;font-size:15px;font-weight:700;line-height:1.3;}
.tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;background:#f2f2f2;color:var(--tx2);}
.tag.g{background:var(--igl);color:var(--ig);}
.match{display:flex;align-items:center;gap:6px;color:var(--ig);font-size:12px;margin:10px 0 0;}
.pricerow{display:flex;align-items:flex-end;justify-content:space-between;border-top:1px solid var(--bd);padding-top:10px;margin-top:10px;}
.price{font-size:18px;font-weight:800;}.vol{font-size:12px;color:var(--tx2);}
.unit{border-radius:7px;padding:4px 9px;font-size:11px;background:#f2f2f2;color:var(--tx2);}
.unit.g{background:var(--igl);color:var(--ig);}.unit b{font-size:13px;}
.buy{display:block;text-align:center;margin-top:12px;background:var(--ig);color:#fff;text-decoration:none;font-size:14px;font-weight:700;padding:11px;border-radius:9px;}
.none{color:var(--tx2);font-size:14px;padding:20px 4px;}
.hide{display:none;}
</style>
</head>

<div class="app">

    <div id="pop">

    <div id="results"></div>
  </div>
</div>

const FEATURES = {"face": "לפנים|פנים|face", "kids": "ילד|תינוק|בייב|baby|kids|פעוט", "mineral": "מינרל|אבץ|תחמוצת|zinc", "clear": "שקוף|שקופה|invisible|ללא קאסט|אינו מלבין|ללא יציקה", "waterproof": "עמיד במים|water.?resist|ספורט|sport|שחייה|זיעה|לשחות|גולש|בריכה", "tinted": "גוון|טינט|tinted|צבעוני|toning|בז'|מדיום", "sensitive": "רגיש|sensitive|אטופי|אלרג", "dry": "עור יבש|יובש|מעניק לחות|לחות|hydrat|moistur", "oily": "שומני|נטול שמן|oil.?free|מאט|matte|קומדוגני", "light": "קליל|לייט|light|אוורירי|קל.?כאוויר|weightless|watery", "natural": "טבעי|אורגני|טבעוני|organic|vegan|reef", "korean": "קוריאני|קוריאנית|korea", "antiage": "אנטי.?אייג|anti.?ag|אייג'ינג|קמטים|wrinkle", "lips": "שפתי|שפתון|lip", "aftersun": "אחרי שיזוף|after.?sun|אפטר|לאחר שיזוף|הרגעה"};
const BRANDS = {"לה רוש-פוזה": "לה רוש|רוש פוזה|anthelios|אנתליוס|la roche", "אוון": "אוון|av[eè]ne", "וישי": "וישי|vichy|capital soleil|קפיטל סוליי", "אוריאז'": "אוריאז|uriage|bariesun|באריאסן", "ביודרמה": "ביודרמה|bioderma|photoderm|פוטודרם", "מוסטלה": "מוסטלה|mustela", "ניוואה": "ניוואה|nivea", "דר פישר": "דר.?פישר|dr.?fischer", "אולטרסול": "אולטרסול|ultrasol", "קרוטן": "קרוטן|carroten", "סבמד": "סבמד|sebamed", "יופי של": "יופי של"};
const GRP={"קרם":"rub","תחליב":"rub","ג'ל":"rub","טיפות":"rub","ספריי":"spray","סטיק":"stick"};
const PREF=['mineral','clear','waterproof','tinted','sensitive','dry','oily','light','natural','korean','antiage','lips','aftersun'];
let EXTRA={};
function feats(text){let f={};for(const k in FEATURES){f[k]=new RegExp(FEATURES[k],'i').test(text);}return f;}
function parseSpf(n){
  let m=n.match(/SPF\s*\+?\s*(\d+)/i)||n.match(/(\d+)\s*SPF/i)||n.match(/מקדם\D{0,8}(\d+)/);
  if(m)return parseInt(m[1]);
  if(/מקדם.{0,10}(גבוה|חזק|מקסימ)|הגנה גבוה|מלא/.test(n))return 50;
  if(/מקדם.{0,10}נמוך|הגנה קל/.test(n))return 20;
  return null;
}
function parseFmt(n){for(const k in GRP){let rx={"קרם":/קרם|cream/i,"תחליב":/תחליב|lotion/i,"ג'ל":/ג'ל|gel/i,"טיפות":/טיפות|drops/i,"ספריי":/ספריי|ספרי|תרסיס|spray/i,"סטיק":/סטיק|stick/i}[k];if(rx.test(n))return k;}return null;}
function parseBrand(n){for(const b in BRANDS){if(new RegExp(BRANDS[b],'i').test(n))return b;}return null;}
function A(text){let q={f:feats(text)};q.spf=parseSpf(text);q.fmt=parseFmt(text);q.brand=parseBrand(text);return q;}
function score(q,c){
  let s=0;
  if(q.spf&&c.spf){let d=Math.abs(q.spf-c.spf);s+=d==0?40:Math.max(0,30-d*3);}
  if(q.fmt){if(c.fmt==q.fmt)s+=30;else if(GRP[q.fmt]==GRP[c.fmt])s+=6;else s-=25;}
  // exclusive dims
  s+=(q.f.kids==c.f.kids)?(q.f.kids?25:4):-25;
  if(q.f.face)s+=c.f.face?20:-15; else s+=c.f.face?-6:6;
  // preference features
  for(const k of PREF){if(q.f[k])s+=c.f[k]?12:-6;}
  // brand: strong boost if the searched brand exists on iHerb (rare - usually equivalence)
  if(q.brand&&c.brand&&new RegExp(BRANDS[q.brand],'i').test(c.brand))s+=50;
  return s;
}
function esc(t){return (t||"").replace(/[&<>]/g,x=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[x]));}
function run(text){document.getElementById('q').value=text;EXTRA={};
  ['hero','pop','trust'].forEach(id=>document.getElementById(id).classList.add('hide'));render(text);}
const FLABEL={face:"לפנים",kids:"לילדים",mineral:"מינרלי",clear:"שקוף",waterproof:"עמיד במים",tinted:"בגוון",
  sensitive:"לעור רגיש",dry:"לעור יבש",oily:"לעור שומני",light:"מרקם קליל",natural:"טבעי",korean:"קוריאני",antiage:"אנטי אייג'ינג",lips:"לשפתיים",aftersun:"אחרי שיזוף"};
function echoText(q){
  let parts=[q.fmt||"הגנה מהשמש", q.spf?("SPF "+q.spf):""];
  for(const k of PREF)if(q.f[k])parts.push(FLABEL[k]);
  if(q.f.kids)parts.push("לילדים"); if(q.f.face&&!q.f.lips)parts.push("לפנים");
  return parts.filter(Boolean).join(" · ");
}
function render(text){
  let q=A(text);
  // apply chip refinements
  for(const k in EXTRA){if(k=='spf30')q.spf=30;else q.f[k]=true;}
  let scored=DATA.map(c=>({c,s:score(q,c)})).filter(x=>x.c.per100);
  scored.sort((a,b)=>b.s-a.s);
  let good=scored.filter(x=>x.s>=35);
  let note="";
  let pool = good.length?good.slice(0,10):(note="לא מצאנו התאמה מדויקת באוסף הזה — הנה הקרובים ביותר.",scored.slice(0,6));
  pool.sort((a,b)=>(b.s-a.s)||(a.c.per100-b.c.per100));
  let top=pool.slice(0,4).map(x=>x.c);
  let valIdx=top.length?top.reduce((bi,c,i,a)=>(c.per100<a[bi].per100?i:bi),0):-1;
  if(q.fmt&&top.length){
    if(!top.some(c=>c.fmt==q.fmt))note="מעט "+q.fmt+" באוסף הזה — הנה החלופות הקרובות ביותר.";
    else if(top.filter(c=>c.fmt==q.fmt).length<3)note="מעט "+q.fmt+" כאן — אלה הקרובים ביותר.";
  }
  let brandnote = q.brand ? `<div class="brandnote">זיהינו את <b>${q.brand}</b> — אייהרב לא בהכרח מוכר אותו, אז מצאנו לך <b>מקבילות משתלמות</b> באותה קטגוריה.</div>` : "";
  let chips=[["face","רק לפנים"],["mineral","מינרלי"],["kids","לילדים"],["waterproof","עמיד במים"],["natural","טבעי"],["spf30","מקדם 30"]];
  let ch=chips.map(([k,l])=>`<button class="${EXTRA[k]?'on':''}" onclick="chip('${k}')">${l}</button>`).join("");
  let noteHtml=note?`<div class="note"><span>ℹ️</span><span>${note}</span></div>`:"";
  let cards=top.length?top.map((c,i)=>card(c,i==0,i==valIdx,q)).join(""):`<div class="none">לא נמצאה מקבילה. נסו לחדד.</div>`;
  document.getElementById('results').innerHTML=
    `<div class="q"><div>${esc(text)}</div></div>
     <div class="echo"><i>✓</i><div>הבנתי — <b>${echoText(q)}</b></div></div>
     ${brandnote}<div class="chips">${ch}</div>${noteHtml}${cards}`;
}
function chip(k){EXTRA[k]=EXTRA[k]?undefined:true;if(!EXTRA[k])delete EXTRA[k];render(document.getElementById('q').value);}
function card(c,best,value,q){
  let matched=[q.spf?("SPF "+c.spf+(c.spfPlus?"+":"")):"",c.fmt];
  for(const k of PREF)if(q.f[k]&&c.f[k])matched.push(FLABEL[k]);
  if(q.f.face&&c.f.face)matched.push("לפנים"); if(q.f.kids&&c.f.kids)matched.push("לילדים");
  let why=matched.filter(Boolean).slice(0,5).join(" · ");
  let tags=[`<span class="tag g">SPF ${c.spf}${c.spfPlus?"+":""}</span>`];
  if(c.fmt)tags.push(`<span class="tag">${c.fmt}</span>`);
  for(const k of ['clear','mineral','waterproof','tinted','natural','korean','light'])if(c.f[k])tags.push(`<span class="tag">${FLABEL[k]}</span>`);
  let unit=c.per100!=null?`<div class="unit ${value?'g':''}"><b>${c.per100} ₪</b> /100מ״ל</div>`:"";
  let img=c.img?`<img class="thumb" src="${c.img}" loading="lazy" onerror="this.style.visibility='hidden'">`:`<div class="thumb"></div>`;
  return `<div class="card ${best?'best':''}"><div class="crow">${img}
    <div style="flex:1;min-width:0">
      ${best?'<span class="badge">ההתאמה הטובה ביותר</span>':''}${value&&!best?'<span class="badge val">הכי משתלם ל-100 מ״ל</span>':''}
      <p class="cname">${esc(c.name)}</p><div class="tags">${tags.slice(0,6).join("")}</div>
    </div></div>
    <div class="match"><span>◎</span> התאמה: ${why}</div>
    <div class="pricerow"><div><span class="price">${c.price} ₪</span> <span class="vol">· ${c.size?Math.round(c.size)+' מ״ל':''}</span></div>${unit}</div>
    <a class="buy" href="${c.url}" target="_blank" rel="noopener">מעבר לאייהרב ←</a></div>`;
}
</script>
